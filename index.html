<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkpoint de Integração e Avaliação — Arquitetura de Gente</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&display=swap');
  :root{
    --bg:#AE263A; --bg-dark:#8c1d2e; --bg-darker:#6e1623;
    --gold:#FFC022; --gold-soft:#ffe7ab; --line:rgba(255,255,255,0.18);
    --white:#FFF; --gray:rgba(255,255,255,0.65);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);font-family:'Open Sans',sans-serif;color:var(--white);min-height:100vh;}
  .wrap{max-width:1100px;margin:0 auto;padding:36px 34px 60px;position:relative;}
  .rings{position:absolute;top:-60px;right:-100px;width:360px;height:360px;opacity:.1;pointer-events:none;}

  /* topbar */
  .topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--line);position:relative;z-index:2;}
  .kicker{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}
  .logo-wrap{display:flex;align-items:center;gap:12px;}
  .logo-img{width:120px;height:76px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.6) saturate(1.3);}
  .logo-text .t1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;color:var(--white);}
  .logo-text .t2{font-family:'Montserrat',sans-serif;font-style:italic;font-weight:600;font-size:11px;color:var(--gold-soft);}

  /* title */
  .title-block{margin-top:20px;position:relative;z-index:2;}
  h1{font-family:'Montserrat',sans-serif;font-weight:900;font-size:32px;line-height:1.05;text-transform:uppercase;}
  h1 span{color:var(--gold);}
  .intro{margin-top:9px;font-size:13.5px;line-height:1.6;color:var(--gold-soft);max-width:820px;}

  /* colab bar */
  .colab-bar{margin-top:20px;display:flex;gap:14px;flex-wrap:wrap;position:relative;z-index:2;}
  .colab-field{flex:1;min-width:180px;}
  .colab-field label{display:block;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:5px;}
  .colab-field input{width:100%;background:rgba(255,255,255,0.08);border:1px solid var(--line);border-radius:8px;color:var(--white);font-family:'Open Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;}
  .colab-field input::placeholder{color:rgba(255,255,255,0.35);}

  /* stepper */
  .stepper{margin-top:26px;display:flex;align-items:center;position:relative;z-index:2;}
  .step-item{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;}
  .step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;background:var(--bg-darker);border:2px solid var(--line);color:var(--gray);transition:all .2s;z-index:2;}
  .step-item.active .step-circle{background:var(--gold);border-color:var(--gold);color:var(--bg-darker);}
  .step-item.done .step-circle{background:transparent;border-color:var(--gold);color:var(--gold);}
  .step-label{margin-top:7px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9.5px;text-align:center;text-transform:uppercase;letter-spacing:.4px;color:var(--gray);max-width:110px;line-height:1.3;}
  .step-item.active .step-label{color:var(--white);}
  .step-connector{position:absolute;top:18px;left:-50%;width:100%;height:2px;background:var(--line);z-index:1;}
  .step-item:first-child .step-connector{display:none;}
  .step-item.done .step-connector{background:var(--gold);}

  /* panel */
  .panel{margin-top:26px;background:rgba(255,255,255,0.06);border:1px solid var(--line);border-radius:18px;padding:26px 28px;position:relative;z-index:2;}
  .panel-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
  .panel-sub{font-size:13px;color:var(--gray);line-height:1.55;margin-bottom:20px;max-width:700px;}
  .panel-sub b{color:var(--white);}

  /* groups / checks */
  .group{margin-bottom:20px;}
  .group-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-soft);border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:12px;}
  .check-item{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .check-item:last-child{border-bottom:none;}
  .chk{width:22px;height:22px;flex:0 0 auto;margin-top:1px;border-radius:6px;border:2px solid var(--gold);background:transparent;cursor:pointer;appearance:none;position:relative;}
  .chk:checked{background:var(--gold);}
  .chk:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--bg-darker);font-weight:900;font-size:13px;}
  .item-text{flex:1;font-size:13px;line-height:1.5;}
  .item-text b{color:var(--gold-soft);font-weight:700;}
  .item-text small{display:block;font-size:11.5px;color:var(--gray);margin-top:3px;font-style:italic;}

  /* progress */
  .prog-row{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .prog-bar{flex:1;height:7px;background:rgba(255,255,255,0.12);border-radius:10px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--gold);border-radius:10px;transition:width .3s;}
  .prog-label{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;color:var(--gold);white-space:nowrap;}

  /* period selector */
  .period-selector{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
  .period-btn{flex:1;min-width:120px;padding:16px 10px;border-radius:14px;border:1.5px solid var(--line);background:rgba(255,255,255,0.05);color:var(--gray);font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-align:center;transition:all .15s;}
  .period-btn:hover{border-color:var(--gold);color:var(--white);}
  .period-btn.selected{background:var(--gold);border-color:var(--gold);color:var(--bg-darker);}
  .period-btn .pb-label{font-size:22px;font-weight:900;display:block;}
  .period-btn .pb-sub{font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;display:block;opacity:.8;}

  /* scale */
  .scale-item{padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .scale-item:last-child{border-bottom:none;}
  .scale-q{font-size:13px;line-height:1.5;margin-bottom:8px;}
  .scale-opts{display:flex;gap:7px;flex-wrap:wrap;}
  .scale-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--line);background:transparent;color:var(--gray);font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .scale-btn:hover{border-color:var(--gold);color:var(--gold);}
  .scale-btn.sel-1{background:rgba(220,50,50,0.25);border-color:#e05555;color:#e05555;}
  .scale-btn.sel-2{background:rgba(255,150,50,0.2);border-color:#ff9632;color:#ff9632;}
  .scale-btn.sel-3{background:rgba(255,210,50,0.2);border-color:var(--gold);color:var(--gold);}
  .scale-btn.sel-4{background:rgba(100,200,100,0.2);border-color:#7dd87d;color:#7dd87d;}

  .obs-area{margin-top:14px;}
  .obs-area label{display:block;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:6px;}
  textarea{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--line);border-radius:10px;color:var(--white);font-family:'Open Sans',sans-serif;font-size:13px;padding:12px 14px;outline:none;resize:vertical;min-height:65px;}

  /* recommendation box */
  .rec-box{margin-top:20px;border-radius:14px;padding:18px 20px;border:1.5px solid;}
  .rec-box.rec-ok{background:rgba(100,200,100,0.1);border-color:#7dd87d;}
  .rec-box.rec-warn{background:rgba(255,192,34,0.1);border-color:var(--gold);}
  .rec-box.rec-bad{background:rgba(220,50,50,0.1);border-color:#e05555;}
  .rec-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .rec-ok .rec-title{color:#7dd87d;} .rec-warn .rec-title{color:var(--gold);} .rec-bad .rec-title{color:#e05555;}
  .rec-items{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .rec-items li{font-size:12.5px;line-height:1.5;color:var(--white);padding-left:18px;position:relative;}
  .rec-items li::before{content:'•';position:absolute;left:0;color:inherit;font-size:16px;line-height:1;top:1px;}
  .rec-ok .rec-items li::before{color:#7dd87d;} .rec-warn .rec-items li::before{color:var(--gold);} .rec-bad .rec-items li::before{color:#e05555;}

  /* verdict */
  .verdict-box{margin-top:18px;background:rgba(0,0,0,0.2);border:1.5px solid var(--gold);border-radius:14px;padding:20px 22px;}
  .verdict-q{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:var(--white);line-height:1.4;margin-bottom:14px;}
  .verdict-q span{color:var(--gold);font-style:italic;}
  .verdict-opts{display:flex;gap:10px;flex-wrap:wrap;}
  .verdict-btn{flex:1;min-width:130px;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:transparent;color:var(--white);font-family:'Montserrat',sans-serif;font-weight:800;font-size:11.5px;letter-spacing:.3px;cursor:pointer;text-align:center;transition:all .15s;text-transform:uppercase;}
  .verdict-btn.v-sim{border-color:#7dd87d;background:rgba(100,200,100,0.12);color:#7dd87d;}
  .verdict-btn.v-ressalva{border-color:var(--gold);background:rgba(255,192,34,0.12);color:var(--gold);}
  .verdict-btn.v-nao{border-color:#e05555;background:rgba(220,50,50,0.12);color:#e05555;}

  /* cross-validation */
  .cross-box{margin-top:14px;border-radius:12px;padding:16px 18px;font-size:13px;line-height:1.6;}
  .cross-ok{background:rgba(100,200,100,0.1);border:1.5px solid #7dd87d;}
  .cross-warn{background:rgba(255,192,34,0.1);border:1.5px solid var(--gold);}
  .cross-bad{background:rgba(220,50,50,0.1);border:1.5px solid #e05555;}
  .cross-box b{font-weight:800;display:block;margin-bottom:6px;font-size:13.5px;}
  .cross-ok b{color:#7dd87d;} .cross-warn b{color:var(--gold);} .cross-bad b{color:#e05555;}
  .cross-box ul{margin:8px 0 0 16px;display:flex;flex-direction:column;gap:5px;}

  /* summary */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .summary-card{background:rgba(0,0,0,0.18);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .summary-card h4{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
  .sum-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
  .sum-row:last-child{border-bottom:none;}
  .sum-score{font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;}
  .sc-a{color:#7dd87d;} .sc-b{color:var(--gold);} .sc-c{color:#ff9632;} .sc-d{color:#e05555;}

  /* nav */
  .nav-row{margin-top:24px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;}
  .nav-btn{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:12px 24px;border-radius:30px;cursor:pointer;border:none;}
  .nav-btn.prev{background:transparent;border:1.5px solid var(--line);color:var(--white);}
  .nav-btn.prev:disabled{opacity:.3;cursor:not-allowed;}
  .nav-btn.next{background:var(--gold);color:var(--bg-darker);}
  .print-btn{background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-family:'Montserrat',sans-serif;font-weight:800;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;padding:11px 20px;border-radius:30px;cursor:pointer;}

  /* footer */
  .footer{margin-top:40px;padding-top:14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:1.5px;position:relative;z-index:2;}
  .footer .wb{color:var(--gray);font-weight:700;} .footer .wb span{color:var(--gold);}

  /* formalização */
  .formal-box{margin-top:22px;background:rgba(0,0,0,0.22);border:1.5px solid var(--line);border-radius:14px;padding:20px 22px;}
  .formal-box.done{border-color:#7dd87d;background:rgba(100,200,100,0.07);}
  .formal-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:12px;}
  .formal-check-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
  .formal-label{font-size:13.5px;line-height:1.5;font-weight:700;}
  .formal-label small{display:block;font-size:12px;font-weight:400;color:var(--gray);margin-top:3px;font-style:italic;}
  .importance-phrase{margin-top:12px;padding:12px 16px;background:rgba(255,192,34,0.08);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;font-size:13px;line-height:1.6;color:var(--gold-soft);font-style:italic;}
  .gaps-summary{margin-top:14px;}
  .gaps-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px;}
  .gap-item{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--white);padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
  .gap-item:last-child{border-bottom:none;}
  .gap-dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;margin-top:5px;}
  .gap-dot.bad{background:#e05555;} .gap-dot.warn{background:#ff9632;} .gap-dot.ok{background:#7dd87d;}

  @media(max-width:680px){.summary-grid{grid-template-columns:1fr;} h1{font-size:24px;} .period-selector{flex-direction:column;}}
  @media print{.nav-row,.stepper,.topbar,.rings{display:none!important;} body{background:white;color:#222;}}
</style>
</head>

  { id:'ob7b', group:'Experiência de Chegada', bold:'Kit com mimos', desc:'Itens físicos entregues no primeiro dia como símbolo de acolhimento — a materialização de que a empresa já contava com a chegada do novo talento. Sugestões: caneta personalizada, bloco de anotações, mochila ou bolsa, garrafa térmica ou squeeze, camiseta ou moletom da empresa, adesivos/stickers e um cartão de boas-vindas escrito à mão.' },
  { id:'ob8', group:'Design da Jornada', bold:'Fluxo de carga parcelado', desc:'Não subir todos os andares em um único dia. Conteúdos densos intercalados com atividades leves — o cérebro precisa de tempo para assentar o conhecimento.' },
  { id:'ob9', group:'Design da Jornada', bold:'Pausas estruturadas e momento de nutrição', desc:'Intervalos planejados, lanche como rito de hospitalidade, tour pela empresa. O esforço deve ser absorvido, não apenas suportado.' },
  { id:'ob10',group:'Design da Jornada', bold:'Comunicação acolhedora', desc:'Estética clara, positiva e acolhedora. Ao final, o profissional deve se sentir energizado por entender que faz parte de uma construção sólida.' },
  { id:'ob11',group:'Integração com a Equipe', bold:'Boas-vindas com a equipe', desc:'O colaborador deve ser formalmente apresentado e integrado à nova equipe pelo líder direto e pelo RH. A integração vai além do crachá: é o primeiro tijolo do pertencimento. Apresentações individuais, alinhamento de expectativas e um momento descontraído de acolhimento fazem toda a diferença nos primeiros dias.' },
];

const EXP_DIMS = [
  { id:'cultural', label:'Aderência Cultural', perguntas:[
    'O profissional respeita os ritos de comunicação internos?',
    'Conectou-se com os valores e com o "jeito de ser" da equipe?',
    'Houve choque de conduta com as normas internas?',
  ]},
  { id:'aprendizado', label:'Aprendizado', perguntas:[
    'Absorveu os treinamentos do Onboarding?',
    'Já domina as ferramentas básicas da função?',
    'O volume de erros diminuiu progressivamente?',
  ]},
  { id:'resultados', label:'Resultados', perguntas:[
    'Cumpriu os marcos estabelecidos no plano do período?',
    'As tarefas básicas do cargo estão sendo entregues com qualidade esperada?',
    'Demonstra proatividade para resolver problemas?',
  ]},
  { id:'relacionamento', label:'Relacionamento', perguntas:[
    'Convive bem coletivamente ou está sempre isolado?',
    'Aceita bem os feedbacks de ajuste?',
    'Consegue expressar suas opiniões de forma construtiva?',
  ]},
];

// ── ESTADO ─────────────────────────────────────────────────────
let step = 0;
const obChecks = {};
let periodoSel = null;   // 30 | 45 | 60 | 90
const scPeriodo = {};  // dim_id -> [scores]
let obsPeriodo  = '';
let verdictPeriodo = null; // 'sim'|'ressalva'|'nao'
let contratoFormalizado = false;

// ── HELPERS ────────────────────────────────────────────────────
function sl(v){ return ['','1 — Não observado','2 — Em desenvolvimento','3 — Atende','4 — Supera'][v]||''; }
function dimAvg(sc, dimId){
  const a=(sc[dimId]||[]).filter(x=>x);
  return a.length ? a.reduce((s,x)=>s+x,0)/a.length : 0;
}
function overallAvg(sc, dims){
  const all = dims.flatMap(d=>(sc[d.id]||[]).filter(x=>x));
  return all.length ? all.reduce((s,x)=>s+x,0)/all.length : 0;
}
function scClass(v){ return v>=3.5?'sc-a':v>=2.5?'sc-b':v>=1.5?'sc-c':v?'sc-d':''; }
function filledCount(sc, dims){ return dims.flatMap(d=>sc[d.id]||[]).filter(x=>x).length; }
function totalQ(dims){ return dims.reduce((s,d)=>s+d.perguntas.length,0); }

// ── RECOMENDAÇÃO AUTOMÁTICA ────────────────────────────────────
function buildRecommendation(sc, dims, is90){
  const avg = overallAvg(sc, dims);
  const filled = filledCount(sc, dims);
  const total  = totalQ(dims);
  if(filled < total * 0.5) return null; // não suficiente

  const dimLabels = { cultural:'Aderência Cultural', aprendizado:'Aprendizado', resultados:'Resultados', relacionamento:'Relacionamento' };

  const bullets = [];
  dims.forEach(d=>{
    const a = dimAvg(sc, d.id);
    if(!a) return;
    const lbl = dimLabels[d.id]||d.label;
    if(a < 2)       bullets.push({ type:'bad',  text:`<b>${lbl}:</b> desempenho crítico abaixo do esperado — requer ação imediata e plano de melhoria.` });
    else if(a < 3) bullets.push({ type:'warn', text:`<b>${lbl}:</b> ainda em desenvolvimento — monitorar de perto nos próximos dias.` });
    else bullets.push({ type:'ok',  text:`<b>${lbl}:</b> desempenho dentro ou acima do esperado — ponto forte do profissional.` });
  });

  let level, cls, title;
  if(avg >= 3){
    level='ok'; cls='rec-ok';
    title = is90 ? '✅ Indicado efetivar — perfil bem alinhado' : '✅ Indicado continuar — perfil bem alinhado';
    if(!bullets.find(b=>b.type==='ok')) bullets.push({type:'ok', text:'Todas as dimensões avaliadas apresentam desempenho dentro ou acima do esperado.'});
  } else if(avg >= 2){
    level='warn'; cls='rec-warn';
    title = is90 ? '⚠️ Efetivar com ressalvas — pontos de atenção identificados' : '⚠️ Continuar com ressalvas — pontos de atenção identificados';
  } else{
    level='bad'; cls='rec-bad';
    title = is90 ? '🔴 Não indicado efetivar — alinhamento abaixo do esperado' : '🔴 Não indicado continuar — alinhamento abaixo do esperado';
    if(!bullets.length) bullets.push({type:'bad', text:'A maioria das dimensões apresenta desempenho abaixo do mínimo esperado para o período.'});
  }
  return { level, cls, title, bullets, avg };
}

// ── CROSS-VALIDATION ───────────────────────────────────────────
function buildCrossValidation(verdict, rec, is90){
  if(!rec || !verdict) return '';
  const rl = rec.level;
  const v  = verdict;

  // cenários
  if(v==='sim' && rl==='ok'){
    return `<div class="cross-box cross-ok"><b>✅ Decisão validada pelos dados</b>O perfil do colaborador sustenta a decisão de ${is90?'efetivação':'renovação'} com segurança. As avaliações do período confirmam o alinhamento esperado.</div>`;
  }
  if(v==='sim' && rl==='warn'){
    const warns = rec.bullets.filter(b=>b.type!=='ok').map(b=>`<li>${b.text}</li>`).join('');
    return `<div class="cross-box cross-warn"><b>⚠️ Atenção: decisão possível, mas com pontos a monitorar</b>A ${is90?'efetivação':'renovação'} pode ser realizada, porém os dados indicam que os itens abaixo precisam de acompanhamento estruturado:<ul>${warns}</ul></div>`;
  }
  if(v==='sim' && rl==='bad'){
    const bads = rec.bullets.map(b=>`<li>${b.text}</li>`).join('');
    return `<div class="cross-box cross-bad"><b>🔴 Alerta: decisão em conflito com os dados</b>Os dados desta avaliação indicam desempenho abaixo do esperado. Se optar por ${is90?'efetivar':'renovar'} mesmo assim, recomendamos formalizar um plano de melhoria com metas claras e prazo definido:<ul>${bads}</ul></div>`;
  }
  if(v==='ressalva' && rl==='ok'){
    return `<div class="cross-box cross-ok"><b>✅ Os dados sustentam uma efetivação segura</b>As avaliações do período indicam bom desempenho. As ressalvas registradas são pontuais e podem ser acompanhadas no ciclo contínuo de desempenho.</div>`;
  }
  if(v==='ressalva' && rl==='warn'){
    const warns = rec.bullets.filter(b=>b.type!=='ok').map(b=>`<li>${b.text}</li>`).join('');
    return `<div class="cross-box cross-warn"><b>⚠️ Efetivação com ressalvas — acompanhamento necessário</b>Os dados confirmam os pontos de atenção identificados. Recomendamos formalizar as ressalvas e definir um plano de ação com prazo:<ul>${warns}</ul></div>`;
  }
  if(v==='nao' && rl==='ok'){
    return `<div class="cross-box cross-warn"><b>⚠️ Divergência: dados indicam bom desempenho</b>As avaliações do período apontam desempenho positivo. Antes de encerrar, revise se existem fatores não capturados na avaliação (incompatibilidade com o time, ajuste de perfil, contexto do cargo) que justifiquem a decisão.</div>`;
  }
  if(v==='nao' && (rl==='warn'||rl==='bad')){
    return `<div class="cross-box cross-ok"><b>✅ Decisão alinhada com os dados</b>Os dados desta avaliação sustentam a decisão de não ${is90?'efetivar':'renovar'}. Documente os feedbacks dados durante o período e as tentativas de correção de rota antes de prosseguir com o encerramento.</div>`;
  }
  return '';
}

// ── RENDER ─────────────────────────────────────────────────────
function renderStepper(){
  document.getElementById('stepper').innerHTML = STEPS.map((s,i)=>{
    const cls = i===step?'active':i<step?'done':'';
    return `<div class="step-item ${cls}" onclick="goStep(${i})">
      <div class="step-connector"></div>
      <div class="step-circle">${i<step?'✓':i+1}</div>
      <div class="step-label">${s.label}</div>
    </div>`;
  }).join('');
}

function renderOnboarding(){
  const done = OB_ITEMS.filter(x=>obChecks[x.id]).length;
  const pct  = Math.round(done/OB_ITEMS.length*100);
  const groups = [...new Set(OB_ITEMS.map(x=>x.group))];
  let h = `<div class="panel-title">Etapa 1 — Kit de Onboarding</div>
    <div class="panel-sub">Marque cada elemento conforme for preparado e entregue ao novo colaborador. <b>"O que não pode faltar"</b> na chegada de um novo talento à obra.</div>
    <div class="prog-row"><div class="prog-bar"><div class="prog-fill" id="progfill" style="width:${pct}%"></div></div><div class="prog-label" id="proglbl">${done}/${OB_ITEMS.length}</div></div>`;
  groups.forEach(g=>{
    h += `<div class="group"><div class="group-title">${g}</div>`;
    OB_ITEMS.filter(x=>x.group===g).forEach(it=>{
      h += `<div class="check-item">
        <input type="checkbox" class="chk" ${obChecks[it.id]?'checked':''} onchange="obCheck('${it.id}',this.checked)">
        <div class="item-text"><b>${it.bold}</b><small>${it.desc}</small></div>
      </div>`;
    });
    h += '</div>';
  });
  return h;
}

function renderPeriodo(){
  const is90 = periodoSel===90;
  let h = `<div class="panel-title">Etapa 2 — Avaliação de Período de Experiência</div>
    <div class="panel-sub">Selecione o período que está avaliando.</div>
    <div style="margin-bottom:20px; padding:14px 18px; background:rgba(255,192,34,0.08); border:1px solid rgba(255,192,34,0.3); border-radius:12px; font-size:13px; line-height:1.7; color:var(--white);">
      <span style="font-family:'Montserrat',sans-serif; font-weight:800; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:6px;">ℹ️ Como funciona o contrato de experiência</span>
      O contrato de experiência tem duração máxima de <b>90 dias</b> e pode ser renovado <b>uma única vez</b> dentro desse prazo — totalizando, no máximo, dois períodos consecutivos. A divisão entre esses períodos varia conforme a política de cada empresa: algumas adotam <b>30 + 60 dias</b>, outras preferem <b>60 + 30</b>, e há ainda quem opte por <b>45 + 45</b>. Para que você possa acompanhar a jornada do colaborador respeitando a realidade da sua empresa, disponibilizamos todas essas opções abaixo.
    </div>
    <div class="period-selector">
      ${[30,45,60,90].map(p=>`<button class="period-btn ${periodoSel===p?'selected':''}" onclick="selectPeriodo(${p})">
        <span class="pb-label">${p}</span><span class="pb-sub">dias</span>
      </button>`).join('')}
    </div>`;

  if(!periodoSel){
    h += `<div style="color:var(--gray);font-size:13px;font-style:italic;margin-top:4px">👆 Selecione o período para abrir a avaliação.</div>`;
    return h;
  }

  // form
  EXP_DIMS.forEach(dim=>{
    h += `<div class="group"><div class="group-title">${dim.label}</div>`;
    dim.perguntas.forEach((q,qi)=>{
      const cur = (scPeriodo[dim.id]||[])[qi]||0;
      h += `<div class="scale-item"><div class="scale-q">${q}</div>
        <div class="scale-opts">${[1,2,3,4].map(v=>`<button class="scale-btn ${cur===v?'sel-'+v:''}" onclick="setScP('${dim.id}',${qi},${v})">${sl(v)}</button>`).join('')}</div></div>`;
    });
    h += '</div>';
  });

  h += `<div class="obs-area"><label>Observações do período (${periodoSel} dias)</label>
    <textarea placeholder="Registre pontos relevantes observados neste período..." oninput="obsPeriodo=this.value">${escH(obsPeriodo)}</textarea></div>`;

  // recomendação
  const rec = buildRecommendation(scPeriodo, EXP_DIMS, is90);
  if(rec){
    const bullets = rec.bullets.map(b=>`<li>${b.text}</li>`).join('');
    h += `<div class="rec-box ${rec.cls}" style="margin-top:20px">
      <div class="rec-title">📊 Com base nas respostas: ${rec.title}</div>
      <ul class="rec-items">${bullets}</ul>
    </div>`;

    // veredicto
    const vq = is90 ? 'Com base na avaliação dos 90 dias, qual é a sua decisão sobre a efetivação?' : `Com base na avaliação dos ${periodoSel} dias, qual é a sua decisão sobre a renovação do contrato?`;
    const opts = is90 ?
      `<button class="verdict-btn ${verdictPeriodo==='sim'?'v-sim':''}" onclick="setVP('sim')">✅ Sim — efetivado(a) com segurança</button>
       <button class="verdict-btn ${verdictPeriodo==='ressalva'?'v-ressalva':''}" onclick="setVP('ressalva')">⚠️ Sim — efetivado(a) com algumas ressalvas</button>
       <button class="verdict-btn ${verdictPeriodo==='nao'?'v-nao':''}" onclick="setVP('nao')">🔴 Não efetivar — encerrar experiência</button>` :
      `<button class="verdict-btn ${verdictPeriodo==='sim'?'v-sim':''}" onclick="setVP('sim')">✅ Renovar contrato</button>
       <button class="verdict-btn ${verdictPeriodo==='nao'?'v-nao':''}" onclick="setVP('nao')">🔴 Não renovar</button>`;

    h += `<div class="verdict-box"><div class="verdict-q"><span>${vq}</span></div>
      <div class="verdict-opts">${opts}</div>`;

    // cross-validation
    if(verdictPeriodo){
      h += buildCrossValidation(verdictPeriodo, rec, is90);
    }
    h += '</div>';
  } else if(periodoSel){
    h += `<div style="margin-top:14px;font-size:12.5px;color:var(--gray);font-style:italic">Preencha ao menos metade das questões para ver a recomendação automática.</div>`;
  }

  // ── BLOCO DE FORMALIZAÇÃO ───────────────────────────────────
  if(periodoSel && verdictPeriodo){
    const gaps = buildGapsList(scPeriodo, EXP_DIMS);
    const phrase = is90
      ? '"Na Arquitetura de Gente, os 90 dias são o tempo de cura do concreto: é nesse período que se revela se a liga entre o profissional e a cultura da empresa realmente aconteceu."'
      : '"Uma integração que não é acompanhada é uma obra sem inspeção técnica. Cada check-in é uma medição que garante que a estrutura está suportando a carga planejada."';
    const doneCls = contratoFormalizado ? 'done' : '';
    const gapsHtml = gaps.length > 0 ? `
      <div class="gaps-summary">
        <div class="gaps-title">📋 Lacunas identificadas que devem constar no registro formal</div>
        ${gaps.map(g=>`<div class="gap-item"><div class="gap-dot ${g.cls}"></div><div>${g.text}</div></div>`).join('')}
      </div>` : `<div style="margin-top:10px;font-size:12.5px;color:#7dd87d">✅ Nenhuma lacuna crítica identificada nas respostas deste período.</div>`;

    h += `<div class="formal-box ${doneCls}">
      <div class="formal-title">📄 Formalização da Avaliação</div>
      <div class="formal-check-row">
        <input type="checkbox" class="chk" ${contratoFormalizado?'checked':''} onchange="contratoFormalizado=this.checked; renderPanel()">
        <div class="formal-label">
          Avaliação do contrato de experiência concluída e documentada
          <small>Marque após registrar formalmente a avaliação no sistema ou prontuário do colaborador.</small>
        </div>
      </div>
      <div class="importance-phrase">${phrase}</div>
      ${gapsHtml}
    </div>`;
    h += `<div style="margin-top:18px"><button class="print-btn" onclick="window.print()">Imprimir / Exportar PDF</button></div>`;
  }

  return h;
}

function buildGapsList(sc, dims){
  const dimLabels = { cultural:'Aderência Cultural', aprendizado:'Aprendizado', resultados:'Resultados', relacionamento:'Relacionamento' };
  const dimDesc   = {
    cultural:     'Ainda há desalinhamento com os valores ou ritos de comunicação da empresa — acompanhar de perto e dar feedback estruturado.',
    aprendizado:  'O profissional ainda não absorveu plenamente os conteúdos do onboarding ou as ferramentas básicas da função — avaliar necessidade de reforço.',
    resultados:   'As entregas e os marcos do período estão abaixo do esperado — revisar metas e verificar se há obstáculos de estrutura ou recurso.',
    relacionamento:'Há sinais de dificuldade de convivência ou de abertura ao feedback — conversas estruturadas e acompanhamento do líder são essenciais.',
  };
  const gaps = [];
  dims.forEach(d=>{
    const a = dimAvg(sc, d.id);
    if(!a) return;
    if(a < 2){ gaps.push({cls:'bad',  text:`<b>${dimLabels[d.id]||d.label}:</b> ${dimDesc[d.id]||'Lacuna crítica identificada — ação imediata necessária.'}` }); }
    else if(a < 3){ gaps.push({cls:'warn', text:`<b>${dimLabels[d.id]||d.label}:</b> ${dimDesc[d.id]||'Em desenvolvimento — monitorar no próximo período.'}` }); }
  });
  return gaps;
}

function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPanel(){
  let c='';
  if(step===0) c=renderOnboarding();
  else c=renderPeriodo();
  document.getElementById('panel').innerHTML=`<div class="panel">${c}</div>`;
}

function renderAll(){
  renderStepper();
  renderPanel();
  document.getElementById('prevBtn').disabled=step===0;
  document.getElementById('nextBtn').textContent=step===STEPS.length-1?'Concluir ✓':'Próxima etapa →';
}

// ── AÇÕES ──────────────────────────────────────────────────────
function goStep(i){ step=i; renderAll(); }
function prevStep(){ if(step>0){step--;renderAll();} }
function nextStep(){ if(step<STEPS.length-1){step++;renderAll();} }

function obCheck(id,val){
  obChecks[id]=val;
  const done=OB_ITEMS.filter(x=>obChecks[x.id]).length;
  const pct=Math.round(done/OB_ITEMS.length*100);
  const f=document.getElementById('progfill');
  const l=document.getElementById('proglbl');
  if(f) f.style.width=pct+'%';
  if(l) l.textContent=done+'/'+OB_ITEMS.length;
}

function selectPeriodo(p){
  periodoSel=p;
  verdictPeriodo=null;
  Object.keys(scPeriodo).forEach(k=>delete scPeriodo[k]);
  renderPanel();
}

function setScP(dimId,qi,val){
  if(!scPeriodo[dimId]) scPeriodo[dimId]=[];
  scPeriodo[dimId][qi]=val;
  renderPanel();
}

function setVP(v){
  verdictPeriodo=v;
  renderPanel();
}

renderAll();
</script>
</body>
</html>
